name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '45 15 * * 4'
permissions:
  contents: read
  security-events: write
  actions: write

jobs:
  eslint:
    name: ESLint ✨
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.12.0]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Install Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"
      - name: Install Dependencies
        run: yarn
      - name: Run ESLint
        run: yarn lint:ci
